<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Turbine - Groupe de musique / Music band">
    <title>Turbine</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

    <!-- Navigation -->
    <nav id="navbar">
        <div class="nav-logo">
            <a href="#home">TURBINE</a>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="#about"   data-i18n="nav.about"></a></li>
            <li><a href="#music"   data-i18n="nav.music"></a></li>
            <li><a href="#video"   data-i18n="nav.video"></a></li>
            <li><a href="#shows"   data-i18n="nav.shows"></a></li>
            <li><a href="#contact" data-i18n="nav.contact"></a></li>
        </ul>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="fr">FR</button>
            <span>|</span>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero">
        <div class="hero-content">
            <h1>TURBINE</h1>
            <p data-i18n="hero.tagline"></p>
        </div>
        <a href="#about" class="scroll-down" aria-label="Scroll down">&#8595;</a>
    </section>

    <!-- About -->
    <section id="about" class="section">
        <div class="container">
            <h2 data-i18n="about.title"></h2>
            <div class="about-content">
                <div class="about-text">
                    <p data-i18n="about.p1"></p>
                    <p data-i18n="about.p2"></p>
                </div>
                <div class="about-image">
                    <img src="assets/images/band/band.jpg" alt="Turbine" onerror="this.parentElement.style.display='none'">
                </div>
            </div>
        </div>
    </section>

    <!-- Music -->
    <section id="music" class="section section-alt">
        <div class="container">
            <h2 data-i18n="music.title"></h2>
            <div class="music-grid" id="music-grid">
                <!-- Album cards injected via JS or added manually here -->
            </div>
            <div class="streaming-links">
                <a href="#" class="stream-btn spotify">Spotify</a>
                <a href="#" class="stream-btn apple">Apple Music</a>
                <a href="#" class="stream-btn bandcamp">Bandcamp</a>
            </div>
        </div>
    </section>

    <!-- Video -->
    <section id="video" class="section">
        <div class="container">
            <h2 data-i18n="video.title"></h2>
            <div class="video-grid">
                <!-- Replace src with YouTube embed URL: https://www.youtube.com/embed/VIDEO_ID -->
                <div class="video-embed">
                    <div class="video-placeholder">
                        <span data-i18n="video.placeholder"></span>
                    </div>
                </div>
                <div class="video-embed">
                    <div class="video-placeholder">
                        <span data-i18n="video.placeholder"></span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Next Shows -->
    <section id="shows" class="section section-alt">
        <div class="container">
            <h2 data-i18n="shows.title"></h2>
            <div class="shows-list" id="shows-list">
                <!--
                Example show item — duplicate as needed:
                <div class="show-item">
                    <div class="show-date">
                        <span class="day">14</span>
                        <span class="month">Juin</span>
                        <span class="year">2026</span>
                    </div>
                    <div class="show-info">
                        <h3>Club Soda</h3>
                        <p>Montréal, QC</p>
                    </div>
                    <a href="#" class="show-ticket" data-i18n="shows.tickets"></a>
                </div>
                -->
                <p class="no-shows" data-i18n="shows.none"></p>
            </div>
        </div>
    </section>

    <!-- Contact -->
    <section id="contact" class="section">
        <div class="container">
            <h2 data-i18n="contact.title"></h2>
            <div class="contact-layout">
                <form id="contact-form" novalidate>
                    <div class="form-group">
                        <input type="text" id="name" name="name" required
                               data-i18n-placeholder="contact.name">
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" name="email" required
                               data-i18n-placeholder="contact.email">
                    </div>
                    <div class="form-group">
                        <textarea id="message" name="message" rows="6" required
                                  data-i18n-placeholder="contact.message"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" data-i18n="contact.send"></button>
                </form>
                <div class="contact-info">
                    <div class="social-links">
                        <a href="#" class="social-link" aria-label="Facebook">Facebook</a>
                        <a href="#" class="social-link" aria-label="Instagram">Instagram</a>
                        <a href="#" class="social-link" aria-label="YouTube">YouTube</a>
                        <a href="#" class="social-link" aria-label="TikTok">TikTok</a>
                    </div>
                    <p class="contact-email">
                        <a href="mailto:info@turbine.com">info@turbine.com</a>
                    </p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; <span id="year"></span> Turbine &mdash; <span data-i18n="footer.rights"></span></p>
    </footer>

    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
