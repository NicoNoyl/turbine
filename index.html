<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Turbine — Groupe de musique / Music band">
    <title>Turbine</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>

    <nav id="navbar">
        <div class="nav-logo">
            <a href="index.html">
                <img src="assets/images/header.png" alt="Turbine" class="nav-logo-img">
            </a>
        </div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html"   data-i18n="nav.about"   data-page="index.html"></a></li>
            <li><a href="music.html"   data-i18n="nav.music"   data-page="music.html"></a></li>
            <li><a href="video.html"   data-i18n="nav.video"   data-page="video.html"></a></li>
            <li><a href="shows.html"   data-i18n="nav.shows"   data-page="shows.html"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact" data-page="contact.html"></a></li>
        </ul>
        <div class="lang-switcher">
            <button class="lang-btn" data-lang="fr">FR</button>
            <span>|</span>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <img src="assets/images/header.png" alt="Turbine" class="hero-logo">
            <p data-i18n="hero.tagline"></p>
        </div>
        <a href="#about" class="scroll-down" aria-label="Scroll">&#8595;</a>
    </section>

    <section id="about" class="section">
        <div class="container">
            <h2 data-i18n="about.title"></h2>
            <div class="about-content">
                <div class="about-text">
                    <p data-i18n="about.p1"></p>
                    <p data-i18n="about.p2"></p>
                </div>
                <div class="about-image">
                    <img src="assets/images/band/band.jpg" alt="Turbine"
                         onerror="this.parentElement.style.display='none'">
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; <span class="year"></span> Turbine &mdash; <span data-i18n="footer.rights"></span></p>
    </footer>

    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
